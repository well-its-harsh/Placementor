<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - PlaceMentor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');
        body {
            font-family: 'Poppins', sans-serif;
        }
        .form-section {
            display: none;
        }
        .form-section.active {
            display: block;
        }
    </style>
</head>
<body class="bg-black min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full space-y-8 bg-black p-8 rounded-xl shadow-lg border border-green-500">
        <div class="text-center">
            <h2 class="text-3xl font-bold text-white">Welcome back</h2>
            <p class="mt-2 text-sm text-gray-400">Sign in to your account</p>
        </div>

        <!-- Django Messages -->
        {% if messages %}
        <div class="mb-4">
            {% for message in messages %}
            <div class="p-2 rounded text-center text-white {{ message.tags }}" style="background-color: #e53e3e;">{{ message }}</div>
            {% endfor %}
        </div>
        {% endif %}

        <!-- User Type Selection -->
        <div class="flex space-x-4 mb-6">
            <button onclick="showForm('student')" class="flex-1 py-2 px-4 border-2 border-green-500 text-green-500 rounded-lg font-medium hover:bg-green-900 transition-colors">
                Student
            </button>
            <button onclick="showForm('recruiter')" class="flex-1 py-2 px-4 border-2 border-gray-600 text-gray-400 rounded-lg font-medium hover:bg-gray-800 transition-colors">
                Recruiter
            </button>
        </div>

        <!-- Student Login Form -->
        <form id="studentForm" class="form-section active mt-8 space-y-6"  method="POST" action="{% url 'login' %}">
            {% csrf_token %}
            <div class="rounded-md shadow-sm space-y-4">
                <div>
                    <label for="studentEmail" class="block text-sm font-medium text-gray-300">Email address</label>
                    <div class="mt-1 relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fas fa-envelope text-gray-400"></i>
                        </div>
                        <input id="email" name="email" type="email" required 
                            class="appearance-none rounded-lg relative block w-full px-3 py-2 pl-10 border border-gray-600 bg-gray-800 placeholder-gray-400 text-white focus:outline-none focus:ring-green-500 focus:border-green-500 focus:z-10 sm:text-sm" 
                            placeholder="Enter your email">
                    </div>
                </div>
                <div>
                    <label for="studentPassword" class="block text-sm font-medium text-gray-300">Password</label>
                    <div class="mt-1 relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fas fa-lock text-gray-400"></i>
                        </div>
                        <input id="password" name="password" type="password" required 
                            class="appearance-none rounded-lg relative block w-full px-3 py-2 pl-10 border border-gray-600 bg-gray-800 placeholder-gray-400 text-white focus:outline-none focus:ring-green-500 focus:border-green-500 focus:z-10 sm:text-sm" 
                            placeholder="Enter your password">
                    </div>
                </div>
            </div>

            <div class="flex items-center justify-between">
                <div class="flex items-center">
                    <input id="remember-me" name="remember-me" type="checkbox" 
                        class="h-4 w-4 text-green-600 focus:ring-green-500 border-gray-600 rounded bg-gray-800">
                    <label for="remember-me" class="ml-2 block text-sm text-gray-300">
                        Remember me
                    </label>
                </div>

                <div class="text-sm">
                    <a href="#" class="font-medium text-green-500 hover:text-green-400">
                        Forgot your password?
                    </a>
                </div>
            </div>

            <div>
                <button type="submit" 
                    class="group relative w-full flex justify-center py-2 px-4 border border-transparent text-sm font-medium rounded-lg text-white bg-green-600 hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-green-500">
                    <span class="absolute left-0 inset-y-0 flex items-center pl-3">
                        <i class="fas fa-sign-in-alt"></i>
                    </span>
                    Sign in as Student
                </button>
            </div>
        </form>

        <!-- Recruiter Login Form -->
        <form id="recruiterForm" class="form-section mt-8 space-y-6"  method="POST" action="{% url 'login' %}">
            {% csrf_token %}
            <div class="rounded-md shadow-sm space-y-4">
                <div>
                    <label for="recruiterEmail" class="block text-sm font-medium text-gray-300">Email address</label>
                    <div class="mt-1 relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fas fa-envelope text-gray-400"></i>
                        </div>
                        <input id="email" name="email" type="email" required 
                            class="appearance-none rounded-lg relative block w-full px-3 py-2 pl-10 border border-gray-600 bg-gray-800 placeholder-gray-400 text-white focus:outline-none focus:ring-green-500 focus:border-green-500 focus:z-10 sm:text-sm" 
                            placeholder="Enter your email">
                    </div>
                </div>
                <div>
                    <label for="recruiterPassword" class="block text-sm font-medium text-gray-300">Password</label>
                    <div class="mt-1 relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fas fa-lock text-gray-400"></i>
                        </div>
                        <input id="password" name="password" type="password" required 
                            class="appearance-none rounded-lg relative block w-full px-3 py-2 pl-10 border border-gray-600 bg-gray-800 placeholder-gray-400 text-white focus:outline-none focus:ring-green-500 focus:border-green-500 focus:z-10 sm:text-sm" 
                            placeholder="Enter your password">
                    </div>
                </div>
            </div>

            <div class="flex items-center justify-between">
                <div class="flex items-center">
                    <input id="remember-me-recruiter" name="remember-me-recruiter" type="checkbox" 
                        class="h-4 w-4 text-green-600 focus:ring-green-500 border-gray-600 rounded bg-gray-800">
                    <label for="remember-me-recruiter" class="ml-2 block text-sm text-gray-300">
                        Remember me
                    </label>
                </div>

                <div class="text-sm">
                    <a href="#" class="font-medium text-green-500 hover:text-green-400">
                        Forgot your password?
                    </a>
                </div>
            </div>

            <div>
                <button type="submit" 
                    class="group relative w-full flex justify-center py-2 px-4 border border-transparent text-sm font-medium rounded-lg text-white bg-green-600 hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-green-500">
                    <span class="absolute left-0 inset-y-0 flex items-center pl-3">
                        <i class="fas fa-sign-in-alt"></i>
                    </span>
                    Sign in as Recruiter
                </button>
            </div>
        </form>

        <div class="text-center">
            <p class="text-sm text-gray-400">
                Don't have an account? 
                <a href="/signup/" class="font-medium text-green-500 hover:text-green-400">
                    Sign up
                </a>
            </p>
        </div>
    </div>

    <script>
        function showForm(formType) {
            // Hide all forms
            document.querySelectorAll('.form-section').forEach(form => {
                form.classList.remove('active');
            });
            
            // Show selected form
            document.getElementById(formType + 'Form').classList.add('active');
            
            // Update button styles
            document.querySelectorAll('button').forEach(button => {
                if (button.textContent.toLowerCase().includes(formType)) {
                    button.classList.add('border-green-500', 'text-green-500');
                    button.classList.remove('border-gray-600', 'text-gray-400');
                } else {
                    button.classList.remove('border-green-500', 'text-green-500');
                    button.classList.add('border-gray-600', 'text-gray-400');
                }
            });
        }
    </script>
</body>
</html>
